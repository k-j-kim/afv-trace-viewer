<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentforce Trace Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --text-dim: #484f58;
    --accent: #388bfd;
    --accent-dim: #1f3455;
    --green: #3fb950;
    --green-dim: #1a3a20;
    --yellow: #d29922;
    --yellow-dim: #2e2110;
    --red: #f85149;
    --purple: #bc8cff;
    --purple-dim: #2a1f45;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Load area ── */
  #load-area {
    max-width: 860px;
    margin: 48px auto;
    padding: 0 16px;
  }

  #load-area h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  #load-area p {
    color: var(--text-muted);
    margin-bottom: 20px;
    font-size: 13px;
  }

  #drop-zone {
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 20px;
    background: var(--bg2);
    transition: border-color 0.15s, background 0.15s;
  }

  #drop-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  #md-input {
    width: 100%;
    height: 180px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 12px;
    resize: vertical;
    outline: none;
    display: block;
    margin-bottom: 12px;
  }

  #md-input:focus { border-color: var(--accent); }

  .load-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
  }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #4d9bff; }

  .btn-secondary {
    background: var(--bg3);
    color: var(--text);
  }
  .btn-secondary:hover { background: var(--border); }

  #file-input { display: none; }

  /* ── Main viewer ── */
  #viewer { display: none; max-width: 900px; margin: 0 auto; padding: 0 16px 48px; }

  /* ── Toolbar ── */
  #toolbar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 0;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  #search-input {
    flex: 1;
    min-width: 200px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    padding: 5px 10px;
    outline: none;
  }
  #search-input:focus { border-color: var(--accent); }

  #match-count {
    color: var(--text-muted);
    font-size: 12px;
    white-space: nowrap;
  }

  /* ── Stats bar ── */
  #stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }

  .tools-section {
    grid-column: 1 / -1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .tools-section-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
    white-space: nowrap;
  }

  .tools-section-body {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    flex: 1;
    min-width: 0;
  }

  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 18px;
    font-weight: 600;
    font-family: var(--mono);
    color: var(--text);
  }

  .stat-sub {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--mono);
    margin-top: 2px;
  }

  /* ── Turn cards ── */
  .turn-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .turn-card.hidden { display: none; }
  .turn-card.highlight { border-color: var(--accent); }

  .turn-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
    background: var(--bg2);
  }
  .turn-header:hover { background: var(--bg3); }

  .turn-num {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    min-width: 28px;
  }

  .turn-ts {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .turn-tokens {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
  }

  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 4px;
    font-weight: 500;
    white-space: nowrap;
  }

  .badge-model { background: var(--bg3); color: var(--text-muted); }
  .badge-ttft { background: var(--purple-dim); color: var(--purple); }
  .badge-tool  { background: var(--yellow-dim);  color: var(--yellow); }
  .badge-skill { background: var(--green-dim);   color: var(--green); }
  .badge-mcp   { background: var(--purple-dim);  color: var(--purple); cursor: default; }
  .badge-none  { background: var(--bg3); color: var(--text-dim); }

  .chevron {
    color: var(--text-dim);
    font-size: 12px;
    margin-left: 4px;
    transition: transform 0.15s;
  }
  .turn-card.collapsed .chevron { transform: rotate(-90deg); }

  /* ── Turn body ── */
  .turn-body { padding: 0 14px 14px; }
  .turn-card.collapsed .turn-body { display: none; }

  .turn-section { margin-top: 12px; }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight: 600;
  }

  .tools-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .tool-entry {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tool-detail {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    word-break: break-all;
  }

  .task-progress ol, .task-progress ul {
    padding-left: 0;
    list-style: none;
  }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    font-size: 13px;
    color: var(--text-muted);
    padding: 2px 0;
  }

  .task-item.done { color: var(--text); }

  .task-check {
    width: 14px;
    height: 14px;
    border: 1px solid var(--border);
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
  }

  .task-item.done .task-check {
    background: var(--green-dim);
    border-color: var(--green);
    color: var(--green);
  }

  /* ── Collapsible detail sections ── */
  .detail-toggle {
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-muted);
    font-size: 12px;
    padding: 4px 10px;
    cursor: pointer;
    margin-top: 8px;
    width: 100%;
    text-align: left;
    transition: background 0.1s;
  }
  .detail-toggle:hover { background: var(--bg3); color: var(--text); }

  .detail-content {
    display: none;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 10px 12px;
    margin-top: 6px;
    font-family: var(--mono);
    font-size: 12px;
    word-break: break-word;
    color: var(--text-muted);
    max-height: 400px;
    overflow-y: auto;
  }

  .detail-content.open { display: block; }

  .detail-view-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .view-tab {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
    font-size: 11px;
    padding: 2px 8px;
    cursor: pointer;
    font-family: var(--mono);
  }
  .view-tab:hover { background: var(--bg3); }
  .view-tab.active { background: var(--bg3); color: var(--text); border-color: var(--text-dim); }

  .raw-pre {
    white-space: pre-wrap;
    word-break: break-word;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
    margin: 0;
  }

  /* ── Divider between header meta and body ── */
  .turn-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0 0 0 0;
  }

  /* ── Back button ── */
  #back-btn {
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  #back-btn:hover { color: var(--text); }

  #raw-trace {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-muted);
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 80vh;
    overflow-y: auto;
  }

  /* ── Message blocks (request payload) ── */
  .msg-block {
    border-left: 2px solid var(--border);
    margin-bottom: 12px;
    padding-left: 10px;
  }

  .msg-role-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .msg-char-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
  }

  .msg-role {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 1px 6px;
    border-radius: 3px;
    display: inline-block;
  }

  .role-system  { background: var(--purple-dim); color: var(--purple); border-left-color: var(--purple); }
  .role-user    { background: var(--accent-dim); color: var(--accent); }
  .role-assistant { background: var(--green-dim); color: var(--green); }

  .msg-block:has(.role-system)  { border-left-color: var(--purple); }
  .msg-block:has(.role-user)    { border-left-color: var(--accent); }
  .msg-block:has(.role-assistant) { border-left-color: var(--green); }

  .msg-content {
    font-family: var(--mono);
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .msg-expand {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 11px;
    cursor: pointer;
    padding: 2px 0;
    font-family: var(--mono);
  }
  .msg-expand:hover { text-decoration: underline; }

  /* ── Role sections (request payload) ── */
  .role-section {
    margin-bottom: 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .role-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 10px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
  }

  .role-section-system  { background: var(--purple-dim); color: var(--purple); }
  .role-section-history { background: var(--bg3); color: var(--text-dim); }

  .role-section-body { padding: 10px; }

  /* ── History turns ── */
  .history-item {
    border-left: 2px solid var(--border);
    margin-bottom: 10px;
    padding-left: 10px;
  }
  .history-item:last-child { margin-bottom: 0; }

  .history-item.history-new { border-left-color: var(--accent); }

  .history-label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .new-badge {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    background: var(--accent-dim);
    color: var(--accent);
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 0.06em;
  }

  /* Collapsed older history turns */
  .history-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    cursor: pointer;
    width: 100%;
    text-align: left;
    padding: 2px 0;
  }

  .history-preview {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .history-toggle:hover .history-preview { color: var(--text-muted); }

  .history-item.collapsed-history .history-body { display: none; }
  .history-item:not(.collapsed-history) .history-body { display: block; margin-top: 8px; }

  /* ── XML/content highlighting ── */
  .xml-tag    { color: var(--accent); }
  .inline-code { color: var(--yellow); background: var(--yellow-dim); padding: 0 3px; border-radius: 3px; }
  .md-header  { color: var(--text); font-weight: 600; }

  /* ── Tool call rendering ── */
  .formatted-response { font-family: var(--mono); font-size: 12px; }

  .resp-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .resp-meta-kv {
    background: var(--bg3);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
  }

  .resp-meta-k { color: var(--purple); }
  .resp-meta-eq { color: var(--text-dim); }
  .resp-meta-v  { color: var(--green); }

  .resp-plain {
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .tool-call {
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .tool-name {
    background: var(--bg3);
    padding: 5px 10px;
    font-weight: 700;
    color: var(--yellow);
    font-size: 12px;
    letter-spacing: 0.02em;
    border-bottom: 1px solid var(--border);
  }

  .tool-params { padding: 8px 10px; }

  .tool-param {
    margin-bottom: 8px;
  }
  .tool-param:last-child { margin-bottom: 0; }

  .param-name {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 2px;
  }

  .param-val {
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text-muted);
    line-height: 1.6;
    font-size: 12px;
  }

  /* ── Stats bar: unique tools fix ── */
  .stat-card .stat-sub {
    white-space: normal;
    word-break: break-all;
    line-height: 1.4;
  }

  /* ── User prompt cards ── */
  .user-prompt-card {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 8px;
    margin-bottom: 4px;
    overflow: hidden;
  }

  .user-prompt-card.hidden { display: none; }

  .user-prompt-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    cursor: pointer;
    user-select: none;
  }
  .user-prompt-header:hover { background: rgba(56, 139, 253, 0.1); }

  .user-prompt-body {
    padding: 0 14px 12px;
    border-top: 1px solid rgba(56, 139, 253, 0.3);
  }
  .user-prompt-card.collapsed .user-prompt-body { display: none; }
  .user-prompt-card.collapsed .chevron { transform: rotate(-90deg); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- Load area -->
<div id="load-area">
  <h1>Agentforce Trace Viewer</h1>
  <p>Paste or upload a <code>trace.md</code> file generated by Agentforce Vibes.</p>
  <div id="drop-zone">
    <textarea id="md-input" placeholder="Paste trace.md content here, or drag &amp; drop the file onto this area..."></textarea>
    <div class="load-actions">
      <button class="btn btn-primary" onclick="parseAndRender()">Parse Trace</button>
      <button class="btn btn-secondary" onclick="document.getElementById('file-input').click()">Upload File</button>
      <input type="file" id="file-input" accept=".md,.txt" onchange="loadFile(event)">
      <span id="load-error" style="color:var(--red);font-size:12px;"></span>
    </div>
  </div>
  <p style="margin-top:14px;font-size:12px;color:var(--text-dim)">
    To share a trace via URL, upload your <code>trace.md</code> as a
    <a href="https://gist.github.com" target="_blank" style="color:var(--accent)">GitHub Gist</a>
    (set to public, copy the <em>Raw</em> URL), then append
    <code style="color:var(--text-muted)">?url=&lt;raw-url&gt;</code> to this page's address.
  </p>
  <div id="url-load-status" style="display:none;margin-top:10px;font-size:13px;color:var(--text-muted)"></div>
</div>

<!-- Viewer -->
<div id="viewer">
  <div id="toolbar">
    <button id="back-btn" onclick="showLoadArea()">&#8592; New trace</button>
    <input type="search" id="search-input" placeholder="Search turns..." oninput="filterTurns(this.value)">
    <span id="match-count"></span>
    <button class="btn btn-secondary" onclick="setAllCollapsed(true)">Collapse all</button>
    <button class="btn btn-secondary" onclick="setAllCollapsed(false)">Expand all</button>
    <button id="share-btn" class="btn btn-secondary" style="display:none" onclick="copyShareLink()">Copy share link</button>
    <button id="raw-btn" class="btn btn-secondary" onclick="toggleRawTrace()">Raw trace</button>
  </div>
  <div id="stats-bar"></div>
  <div id="turns-list"></div>
  <pre id="raw-trace" style="display:none"></pre>
</div>

<script>
// ── Drag & drop ──────────────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) readFile(file);
});

function loadFile(e) {
  const file = e.target.files[0];
  if (file) readFile(file);
}

function readFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('md-input').value = ev.target.result;
    parseAndRender();
  };
  reader.readAsText(file);
}

// ── Parsing ──────────────────────────────────────────────────────────────────
function parseSections(raw) {
  // Split on ### headers that start a line
  const parts = raw.split(/(?=^### )/m).filter(s => s.trim());
  const requests = {};
  const responses = [];
  let respIdx = 0;

  for (const part of parts) {
    const headerMatch = part.match(/^### (\S+) \[(request|response)\]/);
    if (!headerMatch) continue;
    const ts = headerMatch[1];
    const type = headerMatch[2];

    if (type === 'request') {
      const promptId = (part.match(/\*\*Prompt Id\*\*: (\S+)/) || [])[1] || ts;
      const model = (part.match(/\*\*Model\*\*: ([^|]+)/) || [])[1]?.trim() || '';
      // Extract messages JSON from <details> block or plain ```/```json block
      // Require closing ``` to be at start of a line so inline ``` in JSON strings don't cut off early
      const detailsMatch = part.match(/<details>[\s\S]*?```json\n([\s\S]*?)\n```[\s\S]*?<\/details>/)
        || part.match(/\*\*Messages\*\*:\n```(?:json)?\n([\s\S]*?)\n```/);
      requests[promptId] = { ts, model, raw: part, messagesJson: detailsMatch ? detailsMatch[1].trim() : null };
    } else {
      respIdx++;
      const promptId = (part.match(/\*\*Prompt Id\*\*: (\S+)/) || [])[1] || '';
      const turnNum = parseInt((part.match(/\*\*Turn\*\*: (\d+)/) || [])[1] || '0') || respIdx;
      const model = (part.match(/\*\*Model(?:\s+Id)?\*\*: ([^|\n]+)/) || [])[1]?.trim() || '';
      const ttft = parseFloat((part.match(/\*\*TTFT\*\*: ([\d.]+)ms/) || part.match(/\*\*Time to first token\*\*: ([\d.]+)/) || [])[1] || '0');
      const fallback = /\*\*Fallback\*\*: true/.test(part) || /\*\*Is this response using a fallback model\?\*\*: true/.test(part);

      // Tokens: X in / Y out optionally / Z cache-read
      const tokLine = part.match(/\*\*Tokens\*\*: ([\d,]+) in \/ ([\d,]+) out(?:\s*\/\s*([\d,]+) cache-read)?/);
      const tokIn = tokLine ? parseInt(tokLine[1].replace(/,/g, '')) : 0;
      const tokOut = tokLine ? parseInt(tokLine[2].replace(/,/g, '')) : 0;
      const tokCache = tokLine && tokLine[3] ? parseInt(tokLine[3].replace(/,/g, '')) : 0;

      // Tools called
      const toolsMatch = part.match(/\*\*Tools Called\*\*:\n([\s\S]*?)(?=\n\*\*|\n<details>|$)/);
      // tools: [{name, detail}] where detail is the optional "→ ..." suffix
      let tools = [];
      if (toolsMatch) {
        const block = toolsMatch[1].trim();
        if (!block.includes('_(none)_')) {
          tools = block.split('\n').map(l => {
            const m = l.match(/^-\s*`([^`]+)`(?:\s*→\s*(.+))?/);
            if (!m) return null;
            return { name: m[1].trim(), detail: m[2]?.trim() || null };
          }).filter(Boolean);
        }
      }

      // Skills used
      const skillsMatch = part.match(/\*\*Skills Used\*\*:\n([\s\S]*?)(?=\n\*\*|\n<details>|$)/);
      let skills = [];
      if (skillsMatch) {
        const block = skillsMatch[1].trim();
        if (!block.includes('_(none)_')) {
          skills = block.split('\n').map(l => {
            // Skills may be bare (- skill-name) or backtick-wrapped (- `skill-name`)
            const m = l.match(/^-\s*`?([^`\n]+?)`?(?:\s*→.*)?$/);
            return m ? m[1].trim() : null;
          }).filter(Boolean);
        }
      }

      // Task progress
      const progMatch = part.match(/\*\*Task Progress\*\*:\n([\s\S]*?)(?=\n\*\*|\n<details>|$)/);
      let taskItems = [];
      if (progMatch) {
        taskItems = progMatch[1].trim().split(/\n|\\n/).map(l => {
          const m = l.match(/^-\s*\[(x| )\]\s*(.*)/i);
          if (!m) return null;
          return { done: m[1].toLowerCase() === 'x', text: m[2].trim() };
        }).filter(Boolean);
      }

      // Full response from <details> block or inline **Response**: field
      const respDetails = part.match(/<details>\s*<summary>Full Response<\/summary>([\s\S]*?)<\/details>/);
      const respInline = part.match(/\*\*Response\*\*:\n([\s\S]+)/);
      const fullResponse = respDetails ? respDetails[1].trim() : (respInline ? respInline[1].trim() : '');

      responses.push({ ts, promptId, turnNum, model, ttft, fallback, tokIn, tokOut, tokCache, tools, skills, taskItems, fullResponse, raw: part });
    }
  }

  return { requests, responses };
}

function formatTs(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch { return iso; }
}

function fmtNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return String(n);
}

// ── Rendering ────────────────────────────────────────────────────────────────
let allCards = [];

function parseAndRender() {
  const raw = document.getElementById('md-input').value.trim();
  const errEl = document.getElementById('load-error');
  errEl.textContent = '';

  if (!raw) { errEl.textContent = 'Nothing to parse.'; return; }

  let parsed;
  try { parsed = parseSections(raw); } catch(e) { errEl.textContent = 'Parse error: ' + e.message; return; }

  if (!parsed.responses.length) { errEl.textContent = 'No response turns found. Is this a valid trace.md?'; return; }

  renderStats(parsed);
  renderTurns(parsed);

  document.getElementById('load-area').style.display = 'none';
  document.getElementById('viewer').style.display = 'block';
}

function renderStats(parsed) {
  const { requests, responses } = parsed;
  const totalTurns = responses.length;
  const totalIn = responses.reduce((s, r) => s + r.tokIn, 0);
  const totalOut = responses.reduce((s, r) => s + r.tokOut, 0);
  const totalCache = responses.reduce((s, r) => s + r.tokCache, 0);
  const totalTokens = totalIn + totalOut;
  const avgTTFT = responses.length ? Math.round(responses.reduce((s, r) => s + r.ttft, 0) / responses.length) : 0;
  const allTools = new Set(responses.flatMap(r => r.tools.map(t => t.name)));

  // Elapsed: last response ts - first request ts
  let elapsed = '';
  const reqTimes = Object.values(requests).map(r => new Date(r.ts).getTime()).filter(n => !isNaN(n));
  const resTimes = responses.map(r => new Date(r.ts).getTime()).filter(n => !isNaN(n));
  if (reqTimes.length && resTimes.length) {
    const ms = Math.max(...resTimes) - Math.min(...reqTimes);
    const s = Math.round(ms / 1000);
    elapsed = s < 60 ? `${s}s` : `${Math.floor(s/60)}m ${s%60}s`;
  }

  const bar = document.getElementById('stats-bar');
  bar.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Turns</div>
      <div class="stat-value">${totalTurns}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tokens In</div>
      <div class="stat-value">${fmtNum(totalIn)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tokens Out</div>
      <div class="stat-value">${fmtNum(totalOut)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Cache Read</div>
      <div class="stat-value">${fmtNum(totalCache)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Tokens</div>
      <div class="stat-value">${fmtNum(totalTokens)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg TTFT</div>
      <div class="stat-value">${avgTTFT}</div>
      <div class="stat-sub">ms</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Elapsed</div>
      <div class="stat-value">${elapsed || '—'}</div>
    </div>
  `;

  const allModels = new Set(responses.map(r => r.model).filter(Boolean));
  const allSkills = new Set(responses.flatMap(r => r.skills));

  // MCPs: unique URLs from use_mcp_tool calls
  const allMcps = new Set(
    responses.flatMap(r => r.tools
      .filter(t => t.name === 'use_mcp_tool' && t.detail)
      .map(t => t.detail)
    )
  );

  bar.innerHTML += `<div class="tools-section">
    <div class="tools-section-label">Model${allModels.size !== 1 ? 's' : ''} (${allModels.size})</div>
    <div class="tools-section-body">${[...allModels].map(m => `<span class="badge badge-model">${esc(m)}</span>`).join(' ') || '<span style="color:var(--text-dim);font-size:12px">—</span>'}</div>
  </div>
  <div class="tools-section">
    <div class="tools-section-label">Tools used (${allTools.size})</div>
    <div class="tools-section-body">${[...allTools].map(t => `<span class="badge badge-tool">${esc(t)}</span>`).join(' ') || '<span style="color:var(--text-dim);font-size:12px">none</span>'}</div>
  </div>
  <div class="tools-section">
    <div class="tools-section-label">Skills used (${allSkills.size})</div>
    <div class="tools-section-body">${[...allSkills].map(s => `<span class="badge badge-skill">${esc(s)}</span>`).join(' ') || '<span style="color:var(--text-dim);font-size:12px">none</span>'}</div>
  </div>
  <div class="tools-section">
    <div class="tools-section-label">MCPs used (${allMcps.size})</div>
    <div class="tools-section-body">${[...allMcps].map(url => {
      const label = url.split('/').pop() || url;
      return `<span class="badge badge-mcp" title="${esc(url)}">${esc(label)}</span>`;
    }).join(' ') || '<span style="color:var(--text-dim);font-size:12px">none</span>'}</div>
  </div>`;
}

function extractUserPrompt(req) {
  if (!req || !req.messagesJson) return null;
  let msgs;
  try { msgs = JSON.parse(req.messagesJson); } catch(e) { return null; }
  if (!Array.isArray(msgs)) return null;
  for (let i = msgs.length - 1; i >= 0; i--) {
    if (msgs[i].role === 'user') return getContent(msgs[i]);
  }
  return null;
}

const PROMPT_PREVIEW_CHARS = 400;

function buildUserPromptCard(resp, req) {
  if (!req) return null;
  const prompt = extractUserPrompt(req);
  if (!prompt) return null;

  const el = document.createElement('div');
  el.className = 'user-prompt-card';

  const uid = 'up-' + Math.random().toString(36).slice(2);
  const isLong = prompt.length > PROMPT_PREVIEW_CHARS;
  const preview = isLong ? prompt.slice(0, PROMPT_PREVIEW_CHARS) : prompt;
  const rest = isLong ? prompt.slice(PROMPT_PREVIEW_CHARS) : '';

  el.innerHTML = `
    <div class="user-prompt-header" onclick="toggleCard(this.closest('.user-prompt-card'))">
      <span class="msg-role role-user">user</span>
      <span class="turn-ts">${formatTs(req.ts)}</span>
      <span class="msg-char-count" style="margin-left:auto">${fmtNum(prompt.length)} chars</span>
      <span class="chevron">&#9660;</span>
    </div>
    <div class="user-prompt-body">
      <div class="msg-content" style="padding-top:10px">${highlightContent(preview)}${isLong
        ? `<span id="${uid}-rest" class="msg-rest" style="display:none">${highlightContent(rest)}</span><button class="msg-expand" onclick="toggleMsgExpand('${uid}')">&#9654; show ${fmtNum(rest.length)} more chars</button>`
        : ''}</div>
    </div>
  `;

  return { el, searchText: prompt.toLowerCase() };
}

function renderTurns(parsed) {
  const { requests, responses } = parsed;
  const list = document.getElementById('turns-list');
  list.innerHTML = '';
  allCards = [];

  for (let i = 0; i < responses.length; i++) {
    const resp = responses[i];
    const req = requests[resp.promptId] || null;

    const promptCard = buildUserPromptCard(resp, req);
    if (promptCard) list.appendChild(promptCard.el);

    const card = buildCard(resp, req);
    if (promptCard) {
      card.el.dataset.searchText += ' ' + promptCard.searchText;
      card.promptEl = promptCard.el;
    }
    list.appendChild(card.el);
    allCards.push(card);
  }

  updateMatchCount(allCards.length, allCards.length);
}

function buildCard(resp, req) {
  const el = document.createElement('div');
  el.className = 'turn-card';
  el.dataset.searchText = [
    resp.fullResponse,
    resp.tools.map(t => t.name + ' ' + (t.detail || '')).join(' '),
    resp.skills.join(' '),
    resp.taskItems.map(t => t.text).join(' ')
  ].join(' ').toLowerCase();

  const ttftColor = resp.ttft < 1500 ? 'var(--green)' : resp.ttft < 3000 ? 'var(--yellow)' : 'var(--red)';

  // Header badges: name only (compact)
  const toolBadges = resp.tools.length
    ? resp.tools.map(t => `<span class="badge badge-tool">${esc(t.name)}</span>`).join(' ')
    : `<span class="badge badge-none">none</span>`;

  // Body tool list: name + optional detail
  const toolListHtml = resp.tools.length
    ? resp.tools.map(t => `<div class="tool-entry">
        <span class="badge badge-tool">${esc(t.name)}</span>
        ${t.detail ? `<span class="tool-detail">${esc(t.detail)}</span>` : ''}
      </div>`).join('')
    : `<span class="badge badge-none">none</span>`;

  const taskHtml = resp.taskItems.length ? `
    <div class="turn-section">
      <div class="section-label">Task Progress (${resp.taskItems.filter(t=>t.done).length}/${resp.taskItems.length})</div>
      <ul class="task-progress">${resp.taskItems.map(t => `
        <li class="task-item${t.done ? ' done' : ''}">
          <div class="task-check">${t.done ? '&#10003;' : ''}</div>
          <span>${esc(t.text)}</span>
        </li>`).join('')}
      </ul>
    </div>` : '';

  const reqPayload = req
    ? makeDetailBlock('Request messages', formatMessages(req.messagesJson), esc(req.messagesJson || req.raw))
    : '';

  const fullRespHtml = resp.fullResponse
    ? makeDetailBlock('Full response', formatResponse(resp.fullResponse), esc(resp.fullResponse))
    : '';

  el.innerHTML = `
    <div class="turn-header" onclick="toggleCard(this.closest('.turn-card'))">
      <span class="turn-num">#${resp.turnNum}</span>
      <span class="turn-ts">${formatTs(resp.ts)}</span>
      ${resp.model ? `<span class="badge badge-model">${esc(resp.model)}</span>` : ''}
      <span class="badge badge-ttft" style="color:${ttftColor}">${Math.round(resp.ttft)}ms</span>
      ${toolBadges}
      <span class="turn-tokens">${fmtNum(resp.tokIn)} in / ${fmtNum(resp.tokOut)} out${resp.tokCache ? ' / ' + fmtNum(resp.tokCache) + ' cached' : ''}</span>
      <span class="chevron">&#9660;</span>
    </div>
    <hr class="turn-divider">
    <div class="turn-body">
      <div class="turn-section">
        <div class="section-label">Tools Called</div>
        <div class="tools-list">${toolListHtml}</div>
      </div>
      ${taskHtml}
      ${fullRespHtml}
      ${reqPayload}
    </div>
  `;

  return { el, searchText: el.dataset.searchText };
}

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Request payload formatter ────────────────────────────────────────────────
// Parses the JSON messages array and renders each message with role + content.
// System message content is truncated to 500 chars by default.
const SYS_PREVIEW_LINES = 8;   // lines shown for system prompt before truncation
const MSG_PREVIEW_CHARS = 1200; // chars shown for user/assistant before truncation

function formatMessages(jsonStr) {
  if (!jsonStr) return '<em style="color:var(--text-dim)">No payload captured</em>';
  let msgs;
  try { msgs = JSON.parse(jsonStr); } catch(e) {
    return `<div style="color:var(--red);font-size:11px;margin-bottom:6px">JSON parse failed: ${esc(e.message)}</div>${esc(jsonStr.slice(0, 500))}`;
  }
  if (!Array.isArray(msgs)) return esc(jsonStr);

  // Group by role into sections: system (collapsed), then user/assistant turns
  const system = msgs.filter(m => m.role === 'system');
  const turns = msgs.filter(m => m.role !== 'system'); // user + assistant in order

  let out = '';

  // ── SYSTEM section (always collapsed — same every turn) ──────────────────
  if (system.length) {
    const content = getContent(system[0]);
    const uid = 'msg-' + Math.random().toString(36).slice(2);
    const lines = content.split('\n');
    const preview = lines.slice(0, SYS_PREVIEW_LINES).join('\n');
    const rest = lines.slice(SYS_PREVIEW_LINES).join('\n');
    out += `<div class="role-section">
  <div class="role-section-header role-section-system">
    <span>SYSTEM</span>
    <span class="msg-char-count">${fmtNum(content.length)} chars</span>
  </div>
  <div class="role-section-body">
    <div class="msg-content">${highlightContent(preview)}${rest
      ? `<span id="${uid}-rest" class="msg-rest" style="display:none">${highlightContent(rest)}</span>
<button class="msg-expand" onclick="toggleMsgExpand('${uid}')">&#9654; show ${fmtNum(rest.length)} more chars</button>`
      : ''}</div>
  </div>
</div>`;
  }

  // ── USER and ASSISTANT turns ─────────────────────────────────────────────
  // Show all turns but collapse all except the last 2 (new user + last assistant)
  const keepOpen = new Set([turns.length - 1, turns.length - 2]);

  if (turns.length) {
    out += `<div class="role-section">
  <div class="role-section-header role-section-history">
    <span>CONVERSATION HISTORY</span>
    <span class="msg-char-count">${turns.length} turn${turns.length !== 1 ? 's' : ''}</span>
  </div>
  <div class="role-section-body">`;

    turns.forEach((msg, i) => {
      const role = msg.role || 'unknown';
      const content = getContent(msg);
      const uid = 'msg-' + Math.random().toString(36).slice(2);
      const isNew = i === turns.length - 1;
      const roleClass = role === 'user' ? 'role-user' : 'role-assistant';

      let bodyHtml;
      if (role === 'assistant') {
        const trimmed = content.trim();
        bodyHtml = (trimmed.startsWith('<') && /<[\w_:]+>/.test(trimmed))
          ? formatXmlToolCall(trimmed)
          : renderLongContent(content, uid);
      } else {
        bodyHtml = renderLongContent(content, uid);
      }

      // Older turns (not last 2) are collapsed under a toggle
      if (!keepOpen.has(i)) {
        const linePreview = content.split('\n')[0].slice(0, 80);
        out += `<div class="history-item collapsed-history">
  <button class="history-toggle" onclick="this.closest('.history-item').classList.toggle('collapsed-history')">
    <span class="msg-role ${roleClass}">${esc(role)}</span>
    <span class="history-preview">${esc(linePreview)}${content.split('\n')[0].length > 80 ? '…' : ''}</span>
    <span class="msg-char-count">${fmtNum(content.length)} chars</span>
  </button>
  <div class="history-body">${bodyHtml}</div>
</div>`;
      } else {
        out += `<div class="history-item${isNew ? ' history-new' : ''}">
  <div class="history-label">
    <span class="msg-role ${roleClass}">${esc(role)}</span>
    ${isNew ? '<span class="new-badge">new</span>' : ''}
    <span class="msg-char-count">${fmtNum(content.length)} chars</span>
  </div>
  <div class="history-body">${bodyHtml}</div>
</div>`;
      }
    });

    out += `  </div>
</div>`;
  }

  return out;
}

function getContent(msg) {
  return typeof msg.content === 'string' ? msg.content : JSON.stringify(msg.content, null, 2);
}

function renderLongContent(content, uid) {
  const isLong = content.length > MSG_PREVIEW_CHARS;
  const preview = isLong ? content.slice(0, MSG_PREVIEW_CHARS) : content;
  const rest = isLong ? content.slice(MSG_PREVIEW_CHARS) : '';
  return `<div class="msg-content">${highlightContent(preview)}${isLong
    ? `<span id="${uid}-rest" class="msg-rest" style="display:none">${highlightContent(rest)}</span>
<button class="msg-expand" onclick="toggleMsgExpand('${uid}')">&#9654; show ${fmtNum(rest.length)} more chars</button>`
    : ''}</div>`;
}

function toggleMsgExpand(uid) {
  const rest = document.getElementById(uid + '-rest');
  const btn = rest.nextElementSibling;
  const open = rest.style.display === 'none';
  rest.style.display = open ? 'inline' : 'none';
  btn.innerHTML = open
    ? btn.innerHTML.replace('&#9654;', '&#9660;').replace('show', 'hide')
    : btn.innerHTML.replace('&#9660;', '&#9654;').replace('hide', 'show');
}

// Light syntax highlighting for hybrid XML/markdown content
function highlightContent(text) {
  return esc(text)
    // XML tags: <tag_name> and </tag_name> and <tag_name/>
    .replace(/&lt;(\/?[\w_:]+(?:\s[^&]*?)?\/?)&gt;/g,
      (_, inner) => `<span class="xml-tag">&lt;${inner}&gt;</span>`)
    // Inline code `...`
    .replace(/`([^`]+)`/g, '<span class="inline-code">$1</span>')
    // Markdown headers
    .replace(/^(#{1,3} .+)$/gm, '<span class="md-header">$1</span>');
}

// ── Full response formatter ──────────────────────────────────────────────────
// The response is either plain text with metadata, or XML tool call(s).
function formatResponse(text) {
  // Split off any leading key=value metadata line (e.g. "intent=app selected_skill=...")
  const lines = text.split('\n');
  let metaHtml = '';
  let bodyLines = lines;

  const metaLine = lines[0];
  if (/^\w+=\S+/.test(metaLine) && !metaLine.startsWith('<')) {
    const pairs = metaLine.match(/\w+=\S+/g) || [];
    metaHtml = `<div class="resp-meta">${pairs.map(p => {
      const [k, v] = p.split('=');
      return `<span class="resp-meta-kv"><span class="resp-meta-k">${esc(k)}</span><span class="resp-meta-eq">=</span><span class="resp-meta-v">${esc(v)}</span></span>`;
    }).join('')}</div>`;
    bodyLines = lines.slice(1);
  }

  const body = bodyLines.join('\n').trim();

  // Check if body is primarily XML tool calls
  if (body.startsWith('<') && /<[\w_:]+>/.test(body)) {
    return metaHtml + formatXmlToolCall(body);
  }

  // Plain text / markdown
  return metaHtml + `<div class="resp-plain">${highlightContent(body)}</div>`;
}

function formatXmlToolCall(xml) {
  // Parse one or more top-level XML tool blocks
  const toolPattern = /<([\w_:]+)>([\s\S]*?)<\/\1>/g;
  let result = '';
  let match;
  let any = false;
  while ((match = toolPattern.exec(xml)) !== null) {
    any = true;
    const toolName = match[1];
    const inner = match[2];
    result += `<div class="tool-call">
  <div class="tool-name">${esc(toolName)}</div>
  <div class="tool-params">${formatToolParams(inner)}</div>
</div>`;
  }
  if (!any) {
    // Fallback: just highlight
    return `<div class="resp-plain">${highlightContent(xml)}</div>`;
  }
  return result;
}

function formatToolParams(inner) {
  // Each param is <param_name>value</param_name>
  const paramPattern = /<([\w_:]+)>([\s\S]*?)<\/\1>/g;
  let result = '';
  let match;
  let any = false;
  while ((match = paramPattern.exec(inner)) !== null) {
    any = true;
    const name = match[1];
    const val = match[2].trim();
    const isLong = val.length > 300;
    const uid = 'p-' + Math.random().toString(36).slice(2);
    const preview = isLong ? val.slice(0, 300) : val;
    const rest = isLong ? val.slice(300) : '';
    result += `<div class="tool-param">
  <span class="param-name">${esc(name)}</span>
  <div class="param-val">${highlightContent(preview)}${isLong
    ? `<span id="${uid}-rest" class="msg-rest" style="display:none">${highlightContent(rest)}</span><br><button class="msg-expand" onclick="toggleMsgExpand('${uid}')">&#9654; show ${fmtNum(rest.length)} more chars</button>`
    : ''}</div>
</div>`;
  }
  if (!any) result = `<div class="param-val">${highlightContent(inner)}</div>`;
  return result;
}

function toggleCard(card) {
  card.classList.toggle('collapsed');
}

// Store raw text for markdown rendering
const _detailRawText = {};

// Build a collapsible detail block with formatted + raw toggle
function makeDetailBlock(label, formattedHtml, rawText) {
  const uid = 'db-' + Math.random().toString(36).slice(2);
  _detailRawText[uid] = rawText;
  // Convert literal \n to actual newlines for raw display
  const rawDisplay = rawText.replace(/\\n/g, '\n');
  return `<button class="detail-toggle">&#9658; ${esc(label)}</button>
<div class="detail-content" id="${uid}">
  <div class="detail-view-bar">
    <button class="view-tab active" onclick="setDetailView('${uid}','fmt',this)">Formatted</button>
    <button class="view-tab" onclick="setDetailView('${uid}','md',this)">Markdown</button>
    <button class="view-tab" onclick="setDetailView('${uid}','raw',this)">Raw</button>
  </div>
  <div class="detail-fmt">${formattedHtml}</div>
  <div class="detail-md" style="display:none"></div>
  <div class="detail-raw" style="display:none"><pre class="raw-pre">${rawDisplay}</pre></div>
</div>`;
}

function setDetailView(uid, mode, btn) {
  const block = document.getElementById(uid);
  block.querySelector('.detail-fmt').style.display = mode === 'fmt' ? '' : 'none';
  block.querySelector('.detail-raw').style.display = mode === 'raw' ? '' : 'none';
  const mdEl = block.querySelector('.detail-md');
  mdEl.style.display = mode === 'md' ? '' : 'none';
  if (mode === 'md' && !mdEl.dataset.rendered) {
    mdEl.innerHTML = renderMarkdown(_detailRawText[uid] || '');
    mdEl.dataset.rendered = '1';
  }
  block.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t === btn));
}

// Simple markdown renderer — input is HTML-escaped text
function renderMarkdown(escaped) {
  // Unescape to get raw text, then re-process
  const raw = escaped.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"');
  // Convert literal \n to real newlines
  const text = raw.replace(/\\n/g, '\n');
  // Re-escape for safe rendering, then apply markdown transforms
  let html = esc(text);
  // Code blocks (before other transforms)
  html = html.replace(/```(?:\w*)\n([\s\S]*?)```/g, '<pre style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;margin:8px 0;overflow-x:auto;font-size:12px;line-height:1.5;white-space:pre-wrap">$1</pre>');
  // Headers
  html = html.replace(/^(#{1,6}) (.+)$/gm, (_, h, t) => `<h${h.length} style="color:var(--text);margin:12px 0 6px;font-size:${18 - h.length}px">${t}</h${h.length}>`);
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong style="color:var(--text)">$1</strong>');
  // Italic
  html = html.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code style="background:var(--bg3);padding:1px 4px;border-radius:3px;color:var(--yellow)">$1</code>');
  // Checkbox list items (before regular list)
  html = html.replace(/^- \[x\] (.+)$/gm, '<li style="margin-left:20px;list-style:none">&#10003; $1</li>');
  html = html.replace(/^- \[ \] (.+)$/gm, '<li style="margin-left:20px;list-style:none">&#9744; $1</li>');
  // Unordered list items
  html = html.replace(/^- (.+)$/gm, '<li style="margin-left:20px;list-style:disc">$1</li>');
  // Numbered list items
  html = html.replace(/^(\d+)\. (.+)$/gm, '<li style="margin-left:20px;list-style:decimal">$2</li>');
  // Paragraphs (double newline)
  html = html.replace(/\n\n/g, '</p><p style="margin:8px 0">');
  // Single newlines to <br>
  html = html.replace(/\n/g, '<br>');
  return `<div class="markdown-rendered" style="font-family:var(--sans);font-size:13px;line-height:1.6;color:var(--text-muted);padding:8px 0"><p style="margin:8px 0">${html}</p></div>`;
}

document.addEventListener('click', e => {
  if (!e.target.classList.contains('detail-toggle')) return;
  const btn = e.target;
  const content = btn.nextElementSibling;
  if (!content || !content.classList.contains('detail-content')) return;
  const open = content.classList.toggle('open');
  const parts = btn.textContent.trim().split(/\s+(.+)/);
  const label = parts[1] || parts[0];
  btn.textContent = (open ? '\u25be ' : '\u25b8 ') + label;
});

function setAllCollapsed(collapsed) {
  for (const card of allCards) {
    if (collapsed) card.el.classList.add('collapsed');
    else card.el.classList.remove('collapsed');
  }
}

function filterTurns(query) {
  const q = query.toLowerCase().trim();
  let visible = 0;
  for (const card of allCards) {
    const match = !q || card.el.dataset.searchText.includes(q);
    card.el.classList.toggle('hidden', !match);
    if (card.promptEl) card.promptEl.classList.toggle('hidden', !match);
    if (match) visible++;
  }
  updateMatchCount(visible, allCards.length);
}

function updateMatchCount(visible, total) {
  const el = document.getElementById('match-count');
  el.textContent = visible === total ? `${total} turns` : `${visible} of ${total} turns`;
}

function showLoadArea() {
  document.getElementById('viewer').style.display = 'none';
  document.getElementById('load-area').style.display = 'block';
  document.getElementById('share-btn').style.display = 'none';
}

function toggleRawTrace() {
  const raw = document.getElementById('raw-trace');
  const list = document.getElementById('turns-list');
  const stats = document.getElementById('stats-bar');
  const showing = raw.style.display !== 'none';
  if (!showing) {
    raw.textContent = document.getElementById('md-input').value;
    raw.style.display = '';
    list.style.display = 'none';
    stats.style.display = 'none';
    document.getElementById('raw-btn').textContent = 'Parsed view';
  } else {
    raw.style.display = 'none';
    list.style.display = '';
    stats.style.display = '';
    document.getElementById('raw-btn').textContent = 'Raw trace';
  }
}

// ── ?url= loading ────────────────────────────────────────────────────────────
let activeSourceUrl = null;

async function loadFromUrl(rawUrl) {
  const status = document.getElementById('url-load-status');
  status.style.display = 'block';
  status.textContent = 'Fetching trace from URL...';

  try {
    const resp = await fetch(rawUrl);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
    const text = await resp.text();
    document.getElementById('md-input').value = text;
    status.textContent = '';
    activeSourceUrl = rawUrl;
    parseAndRender();
    document.getElementById('share-btn').style.display = '';
  } catch(e) {
    status.style.color = 'var(--red)';
    status.textContent = 'Failed to fetch: ' + e.message;
  }
}

function copyShareLink() {
  if (!activeSourceUrl) return;
  const link = location.origin + location.pathname + '?url=' + encodeURIComponent(activeSourceUrl);
  navigator.clipboard.writeText(link).then(() => {
    const btn = document.getElementById('share-btn');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// On page load, check for ?url= param
(function() {
  const params = new URLSearchParams(location.search);
  const url = params.get('url');
  if (url) loadFromUrl(url);
})();
</script>
